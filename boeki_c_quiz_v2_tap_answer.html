<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>貿易実務C級クイズ 改良版</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#dbe3ef;
      --accent:#2563eb;
      --correct-bg:#ecfdf5;
      --correct-border:#10b981;
      --wrong-bg:#fef2f2;
      --wrong-border:#ef4444;
      --result-bg:#eff6ff;
      --result-border:#93c5fd;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:820px;
      margin:0 auto;
      padding:20px 16px 40px;
    }
    .header{
      margin-bottom:16px;
    }
    .title{
      margin:0 0 6px;
      font-size:28px;
      font-weight:700;
    }
    .sub{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }
    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin:14px 0 16px;
    }
    .chip{
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      border-radius:999px;
      padding:8px 12px;
      font-size:14px;
      cursor:pointer;
    }
    .chip.active{
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
      box-shadow:0 8px 24px rgba(15,23,42,.05);
    }
    .meta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:12px;
      color:var(--muted);
      font-size:13px;
    }
    .question{
      margin:0 0 16px;
      font-size:22px;
      line-height:1.55;
      font-weight:700;
    }
    .choices{
      display:grid;
      gap:10px;
    }
    .choice{
      width:100%;
      border:1px solid var(--border);
      background:#fff;
      border-radius:14px;
      padding:14px 14px;
      text-align:left;
      font-size:16px;
      color:var(--text);
      cursor:pointer;
      transition:transform .04s ease;
    }
    .choice:active{transform:scale(.995)}
    .choice.disabled{cursor:default}
    .choice.correct{
      background:var(--correct-bg);
      border-color:var(--correct-border);
    }
    .choice.wrong{
      background:var(--wrong-bg);
      border-color:var(--wrong-border);
    }
    .result{
      display:none;
      margin-top:16px;
      border:1px solid var(--result-border);
      background:var(--result-bg);
      border-radius:14px;
      padding:14px;
      line-height:1.7;
    }
    .result .judge{
      font-weight:700;
      margin-bottom:8px;
    }
    .result .answer{
      margin-bottom:8px;
      font-weight:700;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }
    .btn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:15px;
      cursor:pointer;
      background:var(--accent);
      color:#fff;
      min-width:120px;
    }
    .btn.secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }
    .footer{
      margin-top:12px;
      color:var(--muted);
      font-size:13px;
    }
    @media (max-width:520px){
      .question{font-size:20px}
      .choice{font-size:15px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1 class="title">貿易実務C級クイズ 改良版</h1>
      <p class="sub">選択肢をタップすると、その場で正解・不正解と解説が表示されます。日本語に加えて、重要な英語表記も入れています。</p>
    </div>

    <div class="chips" id="chips"></div>

    <div class="card">
      <div class="meta">
        <div id="progress"></div>
        <div id="category"></div>
      </div>

      <h2 class="question" id="question"></h2>

      <div class="choices" id="choices"></div>

      <div class="result" id="resultBox">
        <div class="judge" id="judge"></div>
        <div class="answer" id="answer"></div>
        <div id="explanation"></div>
      </div>

      <div class="actions">
        <button class="btn secondary" id="shuffleBtn">シャッフル</button>
        <button class="btn" id="nextBtn">次の問題</button>
      </div>

      <div class="footer">一度選んだ問題は、その問題内では再回答できません。次の問題に進むとリセットされます。</div>
    </div>
  </div>

<script>
const questions = [
  {id:1, category:"L/C・決済", q:"信用状（Letter of Credit）取引における Beneficiary（受益者）は誰か。", options:{A:"Importer（輸入者）", B:"Exporter（輸出者）", C:"Bank（銀行）", D:"Forwarder（フォワーダー）"}, correct:"B", exp:"Beneficiary（受益者）は、信用状（Letter of Credit）に基づいて支払いを受ける側で、通常は Exporter（輸出者）です。"},
  {id:2, category:"L/C・決済", q:"Applicant（発行依頼人）とは何を指すか。", options:{A:"Exporter（輸出者）", B:"Bank（銀行）", C:"信用状の発行依頼人（Applicant / usually the importer）", D:"Customs Broker（通関業者）"}, correct:"C", exp:"Applicant（発行依頼人）は、銀行に信用状（Letter of Credit）の開設を依頼する者で、通常は Importer（輸入者）です。"},
  {id:3, category:"輸送", q:"AWB（Air Waybill / 航空運送状）の特徴として正しいものはどれか。", options:{A:"貨物の所有権を持つ", B:"船便専用の書類", C:"有価証券である", D:"運送状であり、貨物の引渡請求権は持たない"}, correct:"D", exp:"AWB（Air Waybill）は航空貨物の運送状です。B/L（Bill of Lading）と違い、貨物の引渡請求権や所有権を表す書類ではありません。"},
  {id:4, category:"輸送", q:"B/L（Bill of Lading / 船荷証券）の役割として正しいものはどれか。", options:{A:"保険証券（Insurance Policy）", B:"受領証・運送契約書・引渡請求権を持つ書類", C:"見積書（Quotation）", D:"支払条件書"}, correct:"B", exp:"B/L（Bill of Lading）は、受領証、運送契約書、そして貨物の引渡請求権を持つ重要な書類です。"},
  {id:5, category:"インコタームズ", q:"CIF（Cost, Insurance and Freight）条件で、Exporter（輸出者）が負担しないものはどれか。", options:{A:"Freight（運賃）", B:"Insurance（保険）", C:"Import Duty（関税）", D:"船積み関連費用"}, correct:"C", exp:"CIF では Exporter（輸出者）が Freight（運賃）と Insurance（保険）を負担しますが、Import Duty（関税）は Importer（輸入者）負担です。"},
  {id:6, category:"インコタームズ", q:"FOB（Free on Board）でリスクが移転するタイミングはいつか。", options:{A:"契約時", B:"工場出荷時", C:"本船積込時", D:"到着時"}, correct:"C", exp:"FOB（Free on Board）では、貨物が本船に積み込まれた時点でリスクが移転します。"},
  {id:7, category:"書類", q:"Packing List（梱包明細書）の役割は何か。", options:{A:"支払条件を示す", B:"梱包内容・数量・重量を示す", C:"保険内容を示す", D:"契約内容を示す"}, correct:"B", exp:"Packing List は梱包内容、数量、重量などを示す書類で、通関や受け入れ確認に使われます。"},
  {id:8, category:"書類", q:"Commercial Invoice（商業送り状 / 商業インボイス）の役割は何か。", options:{A:"梱包情報を示す", B:"価格と取引条件を示す", C:"輸送手段を指定する", D:"保険内容を示す"}, correct:"B", exp:"Commercial Invoice は価格、品名、数量、取引条件などを示す基本書類で、通関でも重要です。"},
  {id:9, category:"基本用語", q:"Consignee（荷受人）とは誰か。", options:{A:"Shipper（荷送人）", B:"貨物を受け取る側", C:"Bank（銀行）", D:"Insurance Company（保険会社）"}, correct:"B", exp:"Consignee は貨物を受け取る側で、通常は Importer（輸入者）やその代理人です。"},
  {id:10, category:"基本用語", q:"Shipper（荷送人）とは誰か。", options:{A:"貨物を受け取る側", B:"貨物を出荷する側", C:"Customs Broker（通関業者）", D:"Bank（銀行）"}, correct:"B", exp:"Shipper は貨物を出荷する側で、通常は Exporter（輸出者）です。"},
  {id:11, category:"輸送", q:"ETA（Estimated Time of Arrival）の意味はどれか。", options:{A:"出発予定時刻", B:"到着予定時刻", C:"積込日", D:"通関日"}, correct:"B", exp:"ETA は Estimated Time of Arrival の略で、到着予定時刻を意味します。"},
  {id:12, category:"輸送", q:"ETD（Estimated Time of Departure）の意味はどれか。", options:{A:"到着予定時刻", B:"出発予定時刻", C:"積荷目録", D:"支払期限"}, correct:"B", exp:"ETD は Estimated Time of Departure の略で、出発予定時刻を意味します。"},
  {id:13, category:"決済", q:"D/P（Documents against Payment）の意味として正しいものはどれか。", options:{A:"手形引受後書類渡し", B:"支払と引換に書類渡し", C:"無条件支払", D:"前払い"}, correct:"B", exp:"D/P（Documents against Payment）は、支払いと引換に書類を渡す決済条件です。支払後に B/L などを受け取ります。"},
  {id:14, category:"決済", q:"D/A（Documents against Acceptance）の意味として正しいものはどれか。", options:{A:"支払後書類渡し", B:"手形引受後書類渡し", C:"即時決済", D:"分割支払"}, correct:"B", exp:"D/A（Documents against Acceptance）は、手形の引受と引換に書類を渡す決済条件で、支払いは後日行われます。"},
  {id:15, category:"決済", q:"L/C とは何の略か。", options:{A:"Loan Contract", B:"Letter of Credit", C:"Loading Certificate", D:"Legal Contract"}, correct:"B", exp:"L/C は Letter of Credit（信用状）の略です。銀行が一定条件のもとで支払いを保証します。"},
  {id:16, category:"物流", q:"Forwarder（フォワーダー）の役割として正しいものはどれか。", options:{A:"商品を製造する", B:"輸送や書類手配を行う", C:"保険契約だけを担当する", D:"関税を徴収する"}, correct:"B", exp:"Forwarder は輸送手配、物流調整、書類サポートなどを行う物流業者です。"},
  {id:17, category:"物流", q:"Freight の意味はどれか。", options:{A:"保険料", B:"運賃", C:"関税", D:"手数料"}, correct:"B", exp:"Freight は輸送にかかる運賃を意味します。"},
  {id:18, category:"書類", q:"Certificate of Origin（原産地証明書）の目的はどれか。", options:{A:"品質保証", B:"原産地証明", C:"支払保証", D:"梱包証明"}, correct:"B", exp:"Certificate of Origin は商品の原産地を証明する書類で、関税率の適用にも影響します。"},
  {id:19, category:"書類", q:"Manifest（積荷目録）とは何か。", options:{A:"契約書", B:"貨物の一覧を示す書類", C:"保険証券", D:"見積書"}, correct:"B", exp:"Manifest は船舶や航空機に積載された貨物の一覧を示す書類です。"},
  {id:20, category:"物流", q:"Demurrage（滞船料）とは何か。", options:{A:"運賃", B:"保険料", C:"貨物やコンテナの滞留による追加費用", D:"税金"}, correct:"C", exp:"Demurrage はコンテナや船の滞留、引き取り遅延などで発生する追加費用です。"},
  {id:21, category:"書類", q:"Packing List に含まれないものはどれか。", options:{A:"数量（Quantity）", B:"重量（Weight）", C:"価格（Price）", D:"梱包内容"}, correct:"C", exp:"価格は通常 Commercial Invoice に記載され、Packing List には記載しません。"},
  {id:22, category:"物流", q:"Forwarder の役割として誤りはどれか。", options:{A:"輸送手配", B:"書類サポート", C:"商品製造", D:"物流調整"}, correct:"C", exp:"Forwarder は物流や書類手配を行いますが、商品製造は行いません。"},
  {id:23, category:"輸送", q:"Notify Party（着荷通知先）とは何か。", options:{A:"荷送人", B:"通関業者", C:"到着の通知を受ける相手", D:"銀行"}, correct:"C", exp:"Notify Party は貨物到着の通知を受ける相手です。Consignee と同一の場合もあります。"},
  {id:24, category:"通関", q:"HSコード（Harmonized System Code）の役割はどれか。", options:{A:"輸送方法指定", B:"品目分類", C:"保険分類", D:"契約条件"}, correct:"B", exp:"HSコードは国際的な品目分類コードで、関税分類や通関に使用されます。"}
];

const categories = ["すべて", ...new Set(questions.map(q => q.category))];
let currentCategory = "すべて";
let filtered = [...questions];
let currentIndex = 0;
let answered = false;

const chipsEl = document.getElementById("chips");
const progressEl = document.getElementById("progress");
const categoryEl = document.getElementById("category");
const questionEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const resultBox = document.getElementById("resultBox");
const judgeEl = document.getElementById("judge");
const answerEl = document.getElementById("answer");
const explanationEl = document.getElementById("explanation");
const nextBtn = document.getElementById("nextBtn");
const shuffleBtn = document.getElementById("shuffleBtn");

function renderChips(){
  chipsEl.innerHTML = "";
  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "chip" + (cat === currentCategory ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => {
      currentCategory = cat;
      filtered = cat === "すべて" ? [...questions] : questions.filter(q => q.category === cat);
      currentIndex = 0;
      answered = false;
      renderChips();
      renderQuestion();
    };
    chipsEl.appendChild(btn);
  });
}

function renderQuestion(){
  if (!filtered.length) return;
  const item = filtered[currentIndex];
  answered = false;
  progressEl.textContent = `${currentIndex + 1} / ${filtered.length}`;
  categoryEl.textContent = item.category;
  questionEl.textContent = item.q;
  resultBox.style.display = "none";
  judgeEl.textContent = "";
  answerEl.textContent = "";
  explanationEl.textContent = "";

  choicesEl.innerHTML = "";
  ["A","B","C","D"].forEach(letter => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = `<strong>${letter}.</strong> ${item.options[letter]}`;
    btn.onclick = () => handleAnswer(letter);
    choicesEl.appendChild(btn);
  });
}

function handleAnswer(selected){
  if (answered) return;
  answered = true;
  const item = filtered[currentIndex];
  const buttons = [...choicesEl.querySelectorAll(".choice")];

  buttons.forEach((btn, idx) => {
    const letter = ["A","B","C","D"][idx];
    btn.classList.add("disabled");
    if (letter === item.correct) btn.classList.add("correct");
    if (letter === selected && selected !== item.correct) btn.classList.add("wrong");
  });

  judgeEl.textContent = selected === item.correct ? "正解です。" : "不正解です。";
  answerEl.textContent = `正解：${item.correct}. ${item.options[item.correct]}`;
  explanationEl.textContent = item.exp;
  resultBox.style.display = "block";
}

nextBtn.onclick = () => {
  currentIndex = (currentIndex + 1) % filtered.length;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: "smooth" });
};

shuffleBtn.onclick = () => {
  filtered = [...filtered].sort(() => Math.random() - 0.5);
  currentIndex = 0;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: "smooth" });
};

renderChips();
renderQuestion();
</script>
</body>
</html>
