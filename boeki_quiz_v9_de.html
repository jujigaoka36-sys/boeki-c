<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Quiz V9 (Deutsch)</title>
<style>
body{font-family:sans-serif;background:#f4f6fb;margin:0;padding:20px}
.container{max-width:820px;margin:auto;background:#fff;padding:20px;border-radius:12px}
h1{margin-top:0}
.choice{display:block;margin:8px 0;padding:10px;border:1px solid #ccc;border-radius:8px;cursor:pointer}
.correct{background:#d1fae5;border-color:#10b981}
.wrong{background:#fee2e2;border-color:#ef4444}
button{margin-top:15px;padding:10px 15px;border:none;background:#2563eb;color:#fff;border-radius:8px}
</style>
</head>
<body>
<div class="container">
<h1>Außenhandel Quiz V9 (45 Fragen)</h1>
<p id="progress"></p>
<h2 id="question"></h2>
<div id="choices"></div>
<p id="explanation"></p>
<button onclick="next()">Nächste Frage</button>
</div>

<script>
const q = [
{q:"Was ist ein HS-Code?",o:["Eine Transportnummer","Ein Code zur Zollklassifizierung","Ein Versicherungsdokument","Ein Kaufvertrag"],a:1,e:"HS Code = Harmonized System Code (zur Bestimmung von Zollsätzen)"},
{q:"Was bedeutet D/A?",o:["Dokumente gegen sofortige Zahlung","Dokumente nach Annahme eines Wechsels","Bank garantiert Zahlung","Vorauszahlung erforderlich"],a:1,e:"D/A = Documents against Acceptance (Dokumente nach Wechselannahme)"},
{q:"Was bedeutet D/P?",o:["Dokumente nach Wechselannahme","Dokumente gegen Zahlung","Bankgarantie","Ratenzahlung"],a:1,e:"D/P = Documents against Payment"},
{q:"Was ist die Funktion eines L/C?",o:["Transportgarantie","Zahlungsgarantie durch Bank","Versicherungsersatz","Wechselkursabsicherung"],a:1,e:"L/C = Letter of Credit"},
{q:"Was ist die wichtigste Funktion eines B/L?",o:["Versicherungsnachweis","Recht auf Herausgabe der Ware","Preisangabe","Transportplan"],a:1,e:"B/L = Bill of Lading (Wertpapier)"},
{q:"Was ist ein Merkmal eines AWB?",o:["Eigentumsnachweis","Wertpapier","Kein Herausgaberecht","Nur Seetransport"],a:2,e:"AWB = Air Waybill (kein Wertpapier)"},
{q:"Was ist ein Merkmal eines Sea Waybill?",o:["Eigentumsnachweis","Original erforderlich","Kein Original erforderlich","Von Bank ausgestellt"],a:2,e:"Sea Waybill (kein Wertpapier)"},
{q:"Was ist Telex Release?",o:["Transportart","Freigabe ohne Original-B/L","Versicherung","Zollverfahren"],a:1,e:"Telex Release (Freigabe ohne Originaldokument)"},
{q:"Wann erfolgt der Risikoübergang bei FOB?",o:["Bei Vertrag","Bei Versand","Bei Verladung auf Schiff","Bei Ankunft"],a:2,e:"FOB = Free on Board"},
{q:"Was trägt der Verkäufer bei CIF?",o:["Zoll und Abgaben","Fracht und Versicherung","Inlandslogistik","Nur Verpackung"],a:1,e:"CIF = Cost Insurance and Freight"},
{q:"Wer organisiert Versicherung bei FOB?",o:["Verkäufer","Käufer","Reederei","Bank"],a:1,e:"Käufer organisiert Versicherung"},
{q:"Was ist EXW?",o:["Verkäufer organisiert alles","Käufer organisiert fast alles","Bank beteiligt","Versicherung Pflicht"],a:1,e:"EXW = Ex Works"},
{q:"Was zeigt eine Packing List?",o:["Preis","Verpackungsinhalt","Versicherung","Vertrag"],a:1,e:"Packing List zeigt Inhalt und Menge"},
{q:"Was zeigt eine Commercial Invoice?",o:["Transportart","Preis und Bedingungen","Versicherung","Verpackung"],a:1,e:"Commercial Invoice"},
{q:"Was ist ein Manifest?",o:["Vertrag","Liste aller Ladung","Versicherung","Angebot"],a:1,e:"Manifest = Ladungsliste"},
{q:"Was bedeutet ETA?",o:["Abfahrtszeit","Ankunftszeit","Zolltermin","Zahlungsfrist"],a:1,e:"Estimated Time of Arrival"},
{q:"Was bedeutet ETD?",o:["Ankunft","Abfahrt","Zoll","Zahlung"],a:1,e:"Estimated Time of Departure"},
{q:"Wer ist Consignee?",o:["Absender","Empfänger","Bank","Versicherung"],a:1,e:"Empfänger der Ware"},
{q:"Wer ist Shipper?",o:["Empfänger","Absender","Bank","Zollagent"],a:1,e:"Versender"},
{q:"Was bedeutet Freight?",o:["Versicherung","Transportkosten","Steuern","Gebühren"],a:1,e:"Frachtkosten"},
{q:"Wann erfolgt Risiko bei CIF?",o:["Vertrag","Versand","Verladung auf Schiff","Ankunft"],a:2,e:"Risiko bei Verladung"},
{q:"Wer stellt B/L aus?",o:["Exporteur","Importeur","Frachtführer","Bank"],a:2,e:"Carrier stellt B/L aus"},
{q:"Warum ist D/A riskant?",o:["Vorauszahlung","Zahlung später","Keine Versicherung","Zollprobleme"],a:1,e:"Zahlung erfolgt später"},
{q:"Was ist Merkmal von D/P?",o:["Spätere Zahlung","Dokumente gegen Zahlung","Bankgarantie","Raten"],a:1,e:"Dokumente gegen Zahlung"},
{q:"Voraussetzung für Telex Release?",o:["Versicherung","Zahlung erfolgt","Transport beendet","Zoll erledigt"],a:1,e:"Original zurückgegeben"},
{q:"Wann nutzt man Sea Waybill?",o:["Erstgeschäft","Risiko hoch","Vertrauensbasis","Unklarer Zahlung"],a:2,e:"Bei Vertrauen"},
{q:"Wer trägt Risiko bei EXW?",o:["Verkäufer","Käufer","Carrier","Bank"],a:1,e:"Käufer"},
{q:"Warum keine Ware ohne B/L?",o:["Wechselkurs","Kein Dokument","Versicherung fehlt","Verpackung"],a:1,e:"B/L erforderlich"},
{q:"Unterschied CFR vs CIF?",o:["Transport","Versicherung","Währung","Vertrag"],a:1,e:"CIF enthält Versicherung"},
{q:"Was macht ein Forwarder?",o:["Produktion","Transportorganisation","Steuer","Garantie"],a:1,e:"Logistikdienstleister"},
{q:"Was ist Certificate of Origin?",o:["Qualität","Ursprungsnachweis","Zahlung","Verpackung"],a:1,e:"CO"},
{q:"Was ist Demurrage?",o:["Fracht","Versicherung","Verspätungsgebühr","Steuer"],a:2,e:"Strafgebühr für Verzögerung"},
{q:"Warum hält Exporteur B/L?",o:["Steuer","Transport","Zahlungssicherung","Versicherung"],a:2,e:"Sicherung Zahlung"},
{q:"Unterschied AWB und B/L?",o:["Transport","Eigentumsrecht","Währung","Vertrag"],a:1,e:"Nur B/L ist Wertpapier"},
{q:"Wer zahlt Fracht bei FOB?",o:["Verkäufer","Käufer","Carrier","Bank"],a:1,e:"Käufer zahlt"},
{q:"Wer zahlt Versicherung bei CIF?",o:["Verkäufer","Käufer","Bank","Carrier"],a:0,e:"Verkäufer zahlt"},
{q:"Warum ist HS-Code wichtig?",o:["Transport","Zollsätze","Versicherung","Vertrag"],a:1,e:"Bestimmt Zoll"},
{q:"Unterschied Invoice vs Packing?",o:["Gleich","Preis vs Inhalt","Transport","Versicherung"],a:1,e:"Invoice=Preis"},
{q:"Sicherste Zahlung?",o:["Nachzahlung","D/A","D/P","L/C"],a:3,e:"Bankgarantie"},
{q:"Risikoreichste Zahlung?",o:["Voraus","L/C","D/P","D/A"],a:3,e:"Keine Garantie"},
{q:"Wer erstellt Manifest?",o:["Exporteur","Importeur","Carrier","Bank"],a:2,e:"Carrier"},
{q:"Was zeigt Packing List?",o:["Schiff","Inhalt","Bank","Versicherung"],a:1,e:"Inhalt"},
{q:"Wichtigster Faktor im Handel?",o:["Distanz","Währung","Vertrauen","Geschwindigkeit"],a:2,e:"Vertrauen ist entscheidend"}
];

let i=0;
function load(){
document.getElementById("progress").innerText=(i+1)+"/45";
document.getElementById("question").innerText=q[i].q;
const c=document.getElementById("choices");c.innerHTML="";
q[i].o.forEach((opt,idx)=>{
let b=document.createElement("div");
b.className="choice";
b.innerText=opt;
b.onclick=()=>select(idx);
c.appendChild(b);
});
document.getElementById("explanation").innerText="";
}
function select(idx){
const correct=q[i].a;
const choices=document.querySelectorAll(".choice");
choices.forEach((c,j)=>{
if(j===correct)c.classList.add("correct");
if(j===idx && idx!==correct)c.classList.add("wrong");
});
document.getElementById("explanation").innerText="Erklärung: "+q[i].e;
}
function next(){i=(i+1)%q.length;load();}
load();
</script>
</body>
</html>
